<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Website Template</title>
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="chrome-extension://07251cbd-b0bf-4275-8dd7-95a947b4bd7c/app/content-style.css"><script id="RequiredScript">

/* -------------------------
PAGE SWITCHING SYSTEM
------------------------- */

const contentArea = document.getElementById("content-area");
const aboutBtn = document.getElementById("about-btn");
const homeBtn = document.getElementById("home-btn");

/* Save original home */
let savedHomeHTML = contentArea.innerHTML;

/* About page HTML */

const aboutPage = `
<section class="about">
<h2>About Us</h2>
<p>
At Salon Luxe we believe your hair is your signature.
With over 10 years of experience our stylists provide
personalised services designed to bring out confidence
and natural beauty.
</p>
</section>
`;


/* Switch to About */

aboutBtn.onclick = function(e){

e.preventDefault();

/* Save edited home before leaving */
savedHomeHTML = contentArea.innerHTML;

/* Load about */
contentArea.innerHTML = aboutPage;

homeBtn.style.display = "inline-block";

initPage();

};


/* Switch back to Home */

homeBtn.onclick = function(e){

e.preventDefault();

/* Restore saved home */
contentArea.innerHTML = savedHomeHTML;

homeBtn.style.display = "none";

initPage();

};



/* -------------------------
INIT PAGE FEATURES
------------------------- */

function initPage(){
  
enableFormHandler();

}



/* -------------------------
TEXT EDITING
------------------------- */



/* -------------------------
FORM HANDLER
------------------------- */

function enableFormHandler(){

const form=document.querySelector(".contact-form");

if(!form) return;

form.addEventListener("submit",function(e){

e.preventDefault();

alert("Appointment request sent!");

form.reset();

});

}


/* Run once on load */

initPage();

</script></head>

<body id="Sav">

<header class="header">
<div class="logo">Enter Logo Text</div>



</header>


<div id="content-area">
<section class="about">
<h2>About Us</h2>
<p>
At Salon Luxe we believe your hair is your signature.
With over 10 years of experience our stylists provide
personalised services designed to bring out confidence
and natural beauty.
</p>
</section>
</div>


<footer class="footer">
<p class="" style="cursor: text;">© 2026. All Rights Reserved.</p>
</footer>







</body></html>
